# ============================================================
# TradingJournalAnalyzer — Nginx 配置模板
# ============================================================
# 使用方式：
#   方式A（宝塔面板）：网站 → 添加站点 → 手动添加反向代理
#   方式B（手动）：    cp deploy/nginx-tja.conf /etc/nginx/conf.d/tja.conf
#                      nginx -t && nginx -s reload
#
# 注意：如果用宝塔面板管理 nginx，请用宝塔的网站管理功能
#       而不是直接放这个文件，否则宝塔可能会覆盖你的配置
# ============================================================

# 后端上游
upstream tja_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # 改为你的域名或 IP

    # 前端静态文件
    root /opt/TradingJournalAnalyzer/frontend/dist;
    index index.html;

    # 单页应用：所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://tja_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;  # AI 诊断报告可能耗时较长
        proxy_send_timeout 30s;
    }

    # 上传文件大小限制（交割单 Excel 文件）
    client_max_body_size 10M;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
